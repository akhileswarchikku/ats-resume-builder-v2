services:
  - type: web
    name: ats-resume-v2-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    port: 8001
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false          # paste your key manually in Render dashboard
      - key: OPENROUTER_APP_TITLE
        value: ATS Resume Builder v2
      - key: OPENROUTER_HTTP_REFERER
        value: https://ats-resume-v2.vercel.app
      - key: LLM_MODEL
        value: google/gemini-2.5-flash
      - key: DOCS_DIR
        value: /app/docs
      - key: APPLIES_DIR
        value: /app/outputs
